services:
  insightforge:
    build:
      context: .
      args:
        LLM: ${LLM:-qwen2.5:7b}
        EMBED: ${EMBED:-nomic-embed-text}
    image: insightforge:local
    stdin_open: true   # -i
    tty: true          # -t
    volumes:
      - ${PROJECT_DIR:-.}:/workspace
      - insightforge_data:/root/.insightforge
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}

volumes:
  insightforge_data:
