# GPU override — dùng cùng với docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up
#
# Yêu cầu: NVIDIA Container Toolkit
#   https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  insightforge:
    environment:
      # Override để trỏ đến Ollama container thay vì host
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama

volumes:
  ollama_models:
